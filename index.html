<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<link rel="stylesheet" type="text/css" href="./assets/css/style.css">
	<link rel="stylesheet" type="text/css" href="./assets/css/media.css">
	<link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"rel="stylesheet"/>
</head>
<body>
	<header>
		<!-- header -->
		<div class="container nav-bar ">
			<nav class="flex justify-end align-center justify-s-between p-xs-10">
				<ul class="flex gap-25 d-s-none">
					<li>Home</li>
					<li class="colon">:</li>
					<li>Travel</li>
					<li class="colon">:</li>
					<li>Pages</li>
					<li class="colon">:</li>
					<li>shop</li>
					<li class="colon">:</li>
					<li>blog</li>
					<li class="colon">:</li>
					<li>Contact Us</li>
				</ul>
				<ul>
					<span class="more d-xxl-none d-xl-none d-s-inline"><i class="ri-more-2-fill"></i></span>
				</ul>
				<div class="srch-btn flex gap-10">
					<span><i class="ri-menu-line"></i></span>
					<button class="d-m-none d-s-inline">Search</button>
					<span class="d-xxl-none d-xl-none d-m-inline d-s-none"><i class="ri-search-line"></i></span>
				</div>
			</nav>
		</div>
	</header>
	<main>
		<!-- hero section -->
		<section class="hero-sec">
			<div class="container">
				<div class="col-5">
					<div class="hero-content">
						<p>LOVE TRAVEL THEME</p>
						<h1>Adventure & Experience The Travel !</h1>
					</div>
				</div>
				<div class="col-10">
					<div class="hero-card flex justify-around">
						<div class="col-2 search flex align-center gap-10 justify-between">
							<div class="icon">
								<span><i class="ri-search-line"></i></span>
							</div>
							<div class="content">
								<p>Search</p>
								<p>Insert Keyword</p>
							</div>
						</div>
						<div class="col-2 search flex align-center gap-10 justify-between">
							<div class="icon">
								<span><i class="ri-map-pin-fill"></i></span>
							</div>
							<div class="content">
								<p>Destinations</p>
								<p>All Destinations</p>
							</div>
						</div>
						<div class="col-2 search flex align-center gap-10 justify-between">
							<div class="icon">
								<span><i class="ri-earth-fill"></i></span>
							</div>
							<div class="content">
								<p>Typologies</p>
								<p>All Typologies</p>
							</div>
						</div>
						<div class="col-2 flex align-center">
							<div class="hero-btn">
								<button>Search</button>
							</div>
						</div>
					</div>
				</div>
			</div>
		</section>
	</main>
